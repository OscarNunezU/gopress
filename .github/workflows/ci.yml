name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# GitHub is migrating action runners from Node.js 20 → 24.
# This opts in now so we don't break on June 2 2026 when 24 becomes the default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Verify go mod tidy
        # Only check go.sum — go.mod can gain a toolchain directive when tidy
        # runs with a newer patch (e.g. go1.26.2) than the go directive (go 1.26).
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Test (race detector)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Enforce coverage threshold (≥40%)
        run: |
          pct=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 40) { print "Coverage " p "% is below the 40% threshold"; exit 1 } }'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # golangci-lint-action downloads a pre-built binary locked to go1.24,
      # which refuses to typecheck a module declaring 'go 1.26'. Installing
      # from source compiles the linter with the system Go (1.26), removing
      # the version mismatch entirely.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      # Trivy scans the filesystem for known CVEs in Go modules and system packages.
      # CRITICAL/HIGH findings with a fix available fail the build immediately so
      # vulnerabilities cannot reach a published image.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.21.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  publish:
    name: Build, Sign & SBOM
    runs-on: ubuntu-latest
    # Only publish on pushes to main or version tags — never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    needs: [test, lint, scan]
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via GitHub OIDC.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/oscarnunezu/gopress
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing — no long-lived key material.
      # Verification: cosign verify --certificate-identity-regexp="github.com/OscarNunezU/gopress" \
      #               --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
      #               ghcr.io/oscarnunezu/gopress@<digest>
      - name: Sign image with cosign (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/oscarnunezu/gopress@${{ steps.build.outputs.digest }}

      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/oscarnunezu/gopress@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM to image
        run: |
          cosign attach sbom --sbom sbom.spdx.json \
            ghcr.io/oscarnunezu/gopress@${{ steps.build.outputs.digest }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
